  <body>
  <script>
      window.__sc_features = {"auth_ui_datadome_killswitch":false,"api_auth_turn_recaptcha_off":false,"auth_ui_show_email_consent":false,"auth_ui_two_step_authentication":false};
      window.__sc_country_code = "DE";
      window.__sc_statsig = null;
  </script>
    <script>
      (function () {
        function getSearchParam(name) {
          var results = new RegExp('[\?&]' + name + '=([^&#]*)').exec(
            window.location.search
          );
          if (results == null) {
            return null;
          } else {
            return decodeURI(results[1]) || '';
          }
        }

        if (
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches &&
          getSearchParam('theme') !== null &&
          getSearchParam('theme') !== 'light'
        ) {
          document.body.classList.add('dark');
        }

        if (getSearchParam('locale') === 'ar') {
          document.querySelector('html').dir = 'rtl'
        }
      })();
    </script>

    <div id="app"></div>
