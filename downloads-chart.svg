  <defs>
    <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5500;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ff5500;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes draw { from { stroke-dashoffset: 1800; } to { stroke-dashoffset: 0; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .line-path { stroke-dasharray: 1800; stroke-dashoffset: 1800; animation: draw 2s ease-out forwards; }
      .area-path { opacity: 0; animation: fadeIn 1s ease-out 0.35s forwards; }
      .data-point, .text-anim { opacity: 0; animation: fadeIn 0.5s ease-out 0.8s forwards; }
